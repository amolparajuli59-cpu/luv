        :root { --red: #e63946; --white: #ffffff; }
        body { 
            background-color: var(--red); 
            color: var(--white); 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Mathi bata suru hune */

            overflow-y: auto; /* Scroll garna milne banayeko */

        .screen { 
            display: none; 
            width: 100%; 
            max-width: 400px; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            padding: 20px 0;
            animation: fadeIn 0.5s ease; 
        }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Polaroid Style */

        .polaroid img { width: 100%; height: auto; border: 1px solid #eee; }
        .polaroid p { color: #333; font-family: 'Dancing Script', cursive; margin: 10px 0 0 0; font-size: 18px; }
